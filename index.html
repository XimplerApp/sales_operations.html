<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Predictivo Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  background:#22c55e;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}

.green {color:#22c55e;}
.yellow {color:#facc15;}
.red {color:#ef4444;}
</style>
</head>

<body>

<h1>📊 S&OP Predictivo – Galera</h1>

<div class="card">
<h2>⚙️ Parámetros</h2>

<label>Crecimiento esperado (%)</label>
<input id="growth" value="10">

<label>Ticket promedio ($)</label>
<input id="ticket" value="100">

<label>Semanas temporada</label>
<input id="semanas" value="12">

<label>Probabilidad cierre (%)</label>
<input id="prob" value="30">

<button onclick="calcular()">Calcular</button>
</div>

<div class="card">
<h2>📦 Inventario</h2>

<input id="variedad" placeholder="Variedad">
<input id="inv" placeholder="Inventario">
<input id="comp" placeholder="Comprometido">

<button onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<div class="card">
<h2>📊 Resultado S&OP</h2>
<table id="tabla"></table>
</div>

<div class="card">
<h2>🧠 Dashboard Ejecutivo</h2>
<div id="kpis"></div>
</div>

<script>

// ===== DATA =====
let oportunidades = JSON.parse(localStorage.getItem("oportunidades")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== GUARDAR INVENTARIO =====
function guardarInv(){

  let disponible = inv.value - comp.value;

  inventario.push({
    variedad: variedad.value,
    inventario: +inv.value || 0,
    comprometido: +comp.value || 0,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventario));
  renderInv();
}

// ===== RENDER INVENTARIO =====
function renderInv(){

  tablaInv.innerHTML = `
  <tr><th>Variedad</th><th>Disponible</th></tr>`;

  inventario.forEach(i=>{
    tablaInv.innerHTML += `
    <tr>
    <td>${i.variedad}</td>
    <td>${i.disponible}</td>
    </tr>`;
  });
}

// ===== MOTOR PREDICTIVO =====
function calcular(){

  let growth = growthInput();
  let ticket = ticketInput();
  let semanas = semanasInput();
  let prob = probInput();

  let variedades = [...new Set(inventario.map(i=>i.variedad))];

  let resultado = [];

  variedades.forEach(v=>{

    let ventas = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.ventaCerrada||0),0);

    let pipeline = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.ventaEstimada*(prob/100)),0);

    let leads = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.leads||0),0);

    let demandaInducida = leads * 0.1 * ticket;

    let forecast = (ventas + pipeline + demandaInducida) * (1 + growth/100);

    let invData = inventario.find(i=>i.variedad==v) || {};
    let disponible = invData.disponible || 0;

    let demandaSemanal = forecast / semanas;

    let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

    let estado = cobertura < 4 ? "🔴"
               : cobertura < 5 ? "🟡"
               : "🟢";

    let safety = forecast * 0.1;

    let compra = Math.max(0, forecast - disponible + safety);

    resultado.push({
      variedad:v,
      forecast,
      disponible,
      cobertura,
      compra,
      estado
    });

  });

  // ===== TABLA =====
  tabla.innerHTML = `
  <tr>
  <th>Variedad</th>
  <th>Forecast</th>
  <th>Disponible</th>
  <th>Cobertura</th>
  <th>Compra</th>
  <th>Estado</th>
  </tr>`;

  resultado.forEach(r=>{
    tabla.innerHTML += `
    <tr>
    <td>${r.variedad}</td>
    <td>${r.forecast.toLocaleString()}</td>
    <td>${r.disponible}</td>
    <td>${r.cobertura.toFixed(1)}</td>
    <td>${r.compra.toLocaleString()}</td>
    <td>${r.estado}</td>
    </tr>`;
  });

  // ===== KPIs =====
  let coberturaProm = resultado.length
    ? resultado.reduce((a,b)=>a+b.cobertura,0)/resultado.length
    : 0;

  let stockout = resultado.length
    ? resultado.filter(r=>r.cobertura < 4).length / resultado.length * 100
    : 0;

  let fillrate = 100 - stockout;

  kpis.innerHTML = `
  Cobertura promedio: ${coberturaProm.toFixed(1)} semanas<br>
  Stockout riesgo: ${stockout.toFixed(1)}%<br>
  Fill-rate: ${fillrate.toFixed(1)}%<br><br>

  <b>Interpretación:</b><br>
  ${interpretacion(coberturaProm, stockout)}
  `;
}

// ===== INPUTS =====
function growthInput(){ return +document.getElementById("growth").value || 0; }
function ticketInput(){ return +document.getElementById("ticket").value || 0; }
function semanasInput(){ return +document.getElementById("semanas").value || 12; }
function probInput(){ return +document.getElementById("prob").value || 30; }

// ===== INTERPRETACIÓN =====
function interpretacion(cobertura, stockout){

  if(cobertura >=5) return "🟢 Inventario sano, listo para escalar.";
  if(cobertura >=4) return "🟡 Riesgo moderado, monitorear.";
  return "🔴 Riesgo alto de quiebre, comprar inmediatamente.";
}

// INIT
renderInv();

</script>

</body>
</html>
