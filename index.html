<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Predictivo Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  margin:3px;
}

.btn-main {background:#22c55e;}
.btn-blue {background:#38bdf8;}
.btn-yellow {background:#facc15;}
.btn-red {background:#ef4444;}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}
</style>
</head>

<body>

<h1>📊 S&OP Predictivo – Galera</h1>

<!-- PARÁMETROS -->
<div class="card">
<h2>⚙️ Parámetros</h2>

<label>Crecimiento (%)</label>
<input id="growth" value="10">

<label>Ticket promedio</label>
<input id="ticket" value="100">

<label>Semanas</label>
<input id="semanas" value="12">

<label>Probabilidad cierre (%)</label>
<input id="prob" value="30">

<button class="btn-main" onclick="calcular()">Calcular</button>
</div>

<!-- SIMULADOR -->
<div class="card">
<h2>🧪 Simulador de Escenarios</h2>

<button class="btn-blue" onclick="simular('conservador')">🟢 Conservador</button>
<button class="btn-yellow" onclick="simular('crecimiento')">🟡 Crecimiento</button>
<button class="btn-red" onclick="simular('agresivo')">🔴 Agresivo</button>
<button onclick="resetSim()">♻️ Reset</button>
</div>

<!-- INVENTARIO -->
<div class="card">
<h2>📦 Inventario</h2>

<input id="variedad" placeholder="Variedad">
<input id="inv" placeholder="Inventario">
<input id="comp" placeholder="Comprometido">

<button class="btn-main" onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>📊 Resultado S&OP</h2>
<table id="tabla"></table>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>🧠 Dashboard Ejecutivo</h2>
<div id="kpis"></div>
</div>

<script>

// ===== DATA GLOBAL =====
let oportunidades = JSON.parse(localStorage.getItem("oportunidades")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== INVENTARIO =====
function guardarInv(){

  let disponible = (+inv.value || 0) - (+comp.value || 0);

  inventario.push({
    variedad: variedad.value,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventario));

  alert("Inventario guardado ✅");

  renderInv();
}

function renderInv(){

  tablaInv.innerHTML = `
  <tr><th>Variedad</th><th>Disponible</th></tr>`;

  inventario.forEach(i=>{
    tablaInv.innerHTML += `
    <tr>
    <td>${i.variedad}</td>
    <td>${i.disponible}</td>
    </tr>`;
  });
}

// ===== SIMULADOR =====
function simular(tipo){

  let data = [];

  if(tipo === "conservador"){
    data = [
      {variedad:"Tomates", ventaEstimada:2000, ventaCerrada:800, leads:20},
      {variedad:"Cebolla", ventaEstimada:1500, ventaCerrada:600, leads:15}
    ];
  }

  if(tipo === "crecimiento"){
    data = [
      {variedad:"Tomates", ventaEstimada:5000, ventaCerrada:2000, leads:60},
      {variedad:"Cebolla", ventaEstimada:3000, ventaCerrada:1200, leads:40}
    ];
  }

  if(tipo === "agresivo"){
    data = [
      {variedad:"Tomates", ventaEstimada:9000, ventaCerrada:3000, leads:120},
      {variedad:"Cebolla", ventaEstimada:7000, ventaCerrada:2500, leads:90}
    ];
  }

  localStorage.setItem("oportunidades", JSON.stringify(data));

  // 🔥 FIX CLAVE
  oportunidades = data;

  console.log("Oportunidades:", oportunidades);

  alert("Escenario cargado: " + tipo.toUpperCase());
}

// ===== RESET =====
function resetSim(){
  localStorage.removeItem("oportunidades");
  oportunidades = [];
  alert("Simulación eliminada");
}

// ===== CÁLCULO =====
function calcular(){

  if(oportunidades.length === 0){
    alert("Usa el simulador o carga datos reales ❌");
    return;
  }

  if(inventario.length === 0){
    alert("Carga inventario primero ❌");
    return;
  }

  let growth = +growthInput();
  let ticket = +ticketInput();
  let semanas = +semanasInput();
  let prob = +probInput();

  let variedades = [...new Set(inventario.map(i=>i.variedad))];

  let resultado = [];

  variedades.forEach(v=>{

    let ventas = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.ventaCerrada||0),0);

    let pipeline = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.ventaEstimada*(prob/100)),0);

    let leads = oportunidades
      .filter(o=>o.variedad==v)
      .reduce((a,b)=>a+(b.leads||0),0);

    let forecast = (ventas + pipeline + (leads * 0.1 * ticket)) * (1 + growth/100);

    let invData = inventario.find(i=>i.variedad==v) || {};
    let disponible = invData.disponible || 0;

    let demandaSemanal = forecast / semanas;

    let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

    let estado = cobertura < 4 ? "🔴"
               : cobertura < 5 ? "🟡"
               : "🟢";

    let compra = Math.max(0, forecast - disponible + (forecast*0.1));

    resultado.push({variedad:v, forecast, disponible, cobertura, compra, estado});

  });

  // ===== TABLA =====
  tabla.innerHTML = `
  <tr>
  <th>Variedad</th>
  <th>Forecast</th>
  <th>Disponible</th>
  <th>Cobertura</th>
  <th>Compra</th>
  <th>Estado</th>
  </tr>`;

  resultado.forEach(r=>{
    tabla.innerHTML += `
    <tr>
    <td>${r.variedad}</td>
    <td>${r.forecast.toLocaleString()}</td>
    <td>${r.disponible}</td>
    <td>${r.cobertura.toFixed(1)}</td>
    <td>${r.compra.toLocaleString()}</td>
    <td>${r.estado}</td>
    </tr>`;
  });

  // ===== KPIs =====
  let coberturaProm = resultado.reduce((a,b)=>a+b.cobertura,0)/resultado.length;

  let stockout = resultado.filter(r=>r.cobertura < 4).length / resultado.length * 100;

  let fillrate = 100 - stockout;

  kpis.innerHTML = `
  Cobertura promedio: ${coberturaProm.toFixed(1)} semanas<br>
  Stockout riesgo: ${stockout.toFixed(1)}%<br>
  Fill-rate: ${fillrate.toFixed(1)}%<br><br>
  <b>${interpretacion(coberturaProm)}</b>
  `;
}

// ===== INPUTS =====
function growthInput(){ return document.getElementById("growth").value; }
function ticketInput(){ return document.getElementById("ticket").value; }
function semanasInput(){ return document.getElementById("semanas").value; }
function probInput(){ return document.getElementById("prob").value; }

// ===== INTERPRETACIÓN =====
function interpretacion(c){
  if(c>=5) return "🟢 Inventario sano";
  if(c>=4) return "🟡 Riesgo moderado";
  return "🔴 Comprar urgente";
}

// INIT
renderInv();

</script>

</body>
</html>
