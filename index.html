<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Predictivo Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}
.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  margin:3px;
}

.btn-main {background:#22c55e;}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}
</style>
</head>

<body>

<h1>📊 S&OP Predictivo – Galera</h1>

<!-- DEMANDA -->
<div class="card">
<h2>📈 Demanda</h2>

<input id="variedadDemanda" placeholder="Variedad">
<input id="ventasReales" placeholder="Ventas reales">
<input id="pipeline" placeholder="Pipeline">
<input id="leads" placeholder="Leads">

<button class="btn-main" onclick="guardarDemanda()">Guardar</button>

<table id="tablaDemanda"></table>
</div>

<!-- INVENTARIO -->
<div class="card">
<h2>📦 Inventario</h2>

<label>Variedad (automática)</label>
<select id="variedad"></select>

<input id="inv" placeholder="Inventario">
<input id="comp" placeholder="Comprometido">

<button class="btn-main" onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- PARÁMETROS -->
<div class="card">
<h2>⚙️ Parámetros</h2>

<input id="growth" placeholder="Crecimiento (%)" value="10">
<input id="ticket" placeholder="Ticket promedio" value="100">
<input id="semanas" placeholder="Semanas" value="12">
<input id="prob" placeholder="Probabilidad cierre (%)" value="30">

<button class="btn-main" onclick="calcular()">Calcular</button>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>📊 Resultado</h2>
<table id="tabla"></table>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>🧠 Dashboard</h2>
<div id="kpis"></div>
</div>

<script>

let demanda = JSON.parse(localStorage.getItem("demanda")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== GUARDAR DEMANDA =====
function guardarDemanda(){

  demanda.push({
    variedad: variedadDemanda.value,
    ventas: +ventasReales.value || 0,
    pipeline: +pipeline.value || 0,
    leads: +leads.value || 0
  });

  localStorage.setItem("demanda", JSON.stringify(demanda));

  renderDemanda();
  cargarVariedades();
}

// ===== CARGAR VARIEDADES =====
function cargarVariedades(){

  let select = document.getElementById("variedad");

  let variedades = [...new Set(demanda.map(d=>d.variedad))];

  select.innerHTML = "";

  variedades.forEach(v=>{
    let option = document.createElement("option");
    option.value = v;
    option.textContent = v;
    select.appendChild(option);
  });
}

// ===== INVENTARIO =====
function guardarInv(){

  let disponible = (+inv.value || 0) - (+comp.value || 0);

  inventario.push({
    variedad: variedad.value,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventario));

  renderInv();
}

// ===== RENDERS =====
function renderDemanda(){
  tablaDemanda.innerHTML = "<tr><th>Variedad</th><th>Ventas</th><th>Pipeline</th><th>Leads</th></tr>";
  demanda.forEach(d=>{
    tablaDemanda.innerHTML += `<tr><td>${d.variedad}</td><td>${d.ventas}</td><td>${d.pipeline}</td><td>${d.leads}</td></tr>`;
  });
}

function renderInv(){
  tablaInv.innerHTML = "<tr><th>Variedad</th><th>Disponible</th></tr>";
  inventario.forEach(i=>{
    tablaInv.innerHTML += `<tr><td>${i.variedad}</td><td>${i.disponible}</td></tr>`;
  });
}

// ===== CALCULO =====
function calcular(){

  let growth = +growth.value || 0;
  let ticket = +ticket.value || 0;
  let semanas = +semanas.value || 12;
  let prob = +prob.value || 30;

  let resultado = [];

  demanda.forEach(d=>{

    let forecast = (
      d.ventas +
      (d.pipeline * prob/100) +
      (d.leads * 0.1 * ticket)
    ) * (1 + growth/100);

    let invData = inventario.find(i=>i.variedad==d.variedad) || {};
    let disponible = invData.disponible || 0;

    let demandaSemanal = forecast / semanas;
    let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

    let estado = cobertura < 4 ? "🔴" : cobertura < 5 ? "🟡" : "🟢";
    let compra = Math.max(0, forecast - disponible + forecast*0.1);

    resultado.push({variedad:d.variedad, forecast, disponible, cobertura, compra, estado});

  });

  tabla.innerHTML = "<tr><th>Variedad</th><th>Forecast</th><th>Disponible</th><th>Cobertura</th><th>Compra</th><th>Estado</th></tr>";

  resultado.forEach(r=>{
    tabla.innerHTML += `<tr>
      <td>${r.variedad}</td>
      <td>${r.forecast.toLocaleString()}</td>
      <td>${r.disponible}</td>
      <td>${r.cobertura.toFixed(1)}</td>
      <td>${r.compra.toLocaleString()}</td>
      <td>${r.estado}</td>
    </tr>`;
  });
}

// INIT
renderDemanda();
renderInv();
cargarVariedades();

</script>

</body>
</html>
