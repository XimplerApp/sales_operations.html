<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Predictivo Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}
.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  margin:3px;
}

.btn-main {background:#22c55e;}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}
</style>
</head>

<body>

<h1>📊 S&OP Predictivo – Galera</h1>

<!-- DEMANDA -->
<div class="card">
<h2>📈 Demanda</h2>

<input id="variedadDemanda" placeholder="Cultivo/Variedad">
<input id="ventasReales" placeholder="Ventas reales">
<input id="pipeline" placeholder="# Pipeline">
<input id="leads" placeholder="# Leads">

<button class="btn-main" onclick="guardarDemanda()">Guardar</button>

<table id="tablaDemanda"></table>
</div>

<!-- INVENTARIO -->
<div class="card">
<h2>📦 Inventario</h2>

<label>Cultivo-Variedad</label>
<select id="variedad"></select>

<input id="inv" placeholder="Inventario">
<input id="comp" placeholder="Comprometido">

<button class="btn-main" onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- PARÁMETROS -->
<div class="card">
<h2>⚙️ Parámetros</h2>

<label>Cultivo-Variedad a Analizar</label>
<select id="variedadCalculo"></select>

<input id="growth" placeholder="Crecimiento (%)" value="10">
<input id="ticket" placeholder="Ticket promedio" value="100">
<input id="semanas" placeholder="Semanas" value="12">
<input id="prob" placeholder="Probabilidad cierre (%)" value="30">

<button class="btn-main" onclick="calcular()">Calcular</button>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>📊 Resultado</h2>
<table id="tabla"></table>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>🧠 Dashboard</h2>
<div id="kpis"></div>
</div>

<script>

// ===== DATA =====
let demanda = JSON.parse(localStorage.getItem("demanda")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== GUARDAR DEMANDA =====
function guardarDemanda(){

  if(!variedadDemanda.value){
    alert("Escribe una variedad ❌");
    return;
  }

  demanda.push({
    variedad: variedadDemanda.value,
    ventas: +ventasReales.value || 0,
    pipeline: +pipeline.value || 0,
    leads: +leads.value || 0
  });

  localStorage.setItem("demanda", JSON.stringify(demanda));

  renderDemanda();
  cargarVariedades();
}

// ===== CARGAR VARIEDADES =====
function cargarVariedades(){

  let selectInv = document.getElementById("variedad");
  let selectCalc = document.getElementById("variedadCalculo");

  let variedades = [...new Set(demanda.map(d=>d.variedad))];

  selectInv.innerHTML = "";
  selectCalc.innerHTML = "";

  variedades.forEach(v=>{
    let opt1 = document.createElement("option");
    opt1.value = v;
    opt1.textContent = v;

    let opt2 = document.createElement("option");
    opt2.value = v;
    opt2.textContent = v;

    selectInv.appendChild(opt1);
    selectCalc.appendChild(opt2);
  });
}

// ===== INVENTARIO =====
function guardarInv(){

  let disponible = (+inv.value || 0) - (+comp.value || 0);

  inventario.push({
    variedad: variedad.value,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventario));

  renderInv();
}

// ===== RENDER DEMANDA =====
function renderDemanda(){

  tablaDemanda.innerHTML = `
  <tr><th>Variedad</th><th>Ventas</th><th>Pipeline</th><th>Leads</th></tr>`;

  demanda.forEach(d=>{
    tablaDemanda.innerHTML += `
    <tr>
      <td>${d.variedad}</td>
      <td>${d.ventas}</td>
      <td>${d.pipeline}</td>
      <td>${d.leads}</td>
    </tr>`;
  });
}

// ===== RENDER INVENTARIO =====
function renderInv(){

  tablaInv.innerHTML = `
  <tr><th>Variedad</th><th>Disponible</th></tr>`;

  inventario.forEach(i=>{
    tablaInv.innerHTML += `
    <tr>
      <td>${i.variedad}</td>
      <td>${i.disponible}</td>
    </tr>`;
  });
}

// ===== CALCULO =====
function calcular(){

  let tabla = document.getElementById("tabla");
  let kpis = document.getElementById("kpis");

  let variedadSeleccionada = document.getElementById("variedadCalculo").value;

  if(!variedadSeleccionada){
    alert("Selecciona una variedad ❌");
    return;
  }

  let d = demanda.find(x => x.variedad == variedadSeleccionada);

  if(!d){
    alert("No hay datos de demanda ❌");
    return;
  }

  let growth = +document.getElementById("growth").value || 0;
  let ticket = +document.getElementById("ticket").value || 0;
  let semanas = +document.getElementById("semanas").value || 12;
  let prob = +document.getElementById("prob").value || 30;

  let forecast = (
    d.ventas +
    (d.pipeline * prob/100) +
    (d.leads * 0.1 * ticket)
  ) * (1 + growth/100);

  let invData = inventario.find(i=>i.variedad==d.variedad) || {};
  let disponible = invData.disponible || 0;

  let demandaSemanal = forecast / semanas;
  let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

  let estado = cobertura < 4 ? "🔴" : cobertura < 5 ? "🟡" : "🟢";
  let compra = Math.max(0, forecast - disponible + forecast*0.1);

  // TABLA
  tabla.innerHTML = `
  <tr>
  <th>Variedad</th>
  <th>Forecast</th>
  <th>Disponible</th>
  <th>Cobertura</th>
  <th>Compra</th>
  <th>Estado</th>
  </tr>

  <tr>
    <td>${d.variedad}</td>
    <td>${forecast.toLocaleString()}</td>
    <td>${disponible}</td>
    <td>${cobertura.toFixed(1)}</td>
    <td>${compra.toLocaleString()}</td>
    <td>${estado}</td>
  </tr>
  `;

  // KPIs
  let stockout = cobertura < 4 ? 100 : 0;
  let fillrate = 100 - stockout;

  kpis.innerHTML = `
  Cobertura: ${cobertura.toFixed(1)} semanas<br>
  Stockout riesgo: ${stockout}%<br>
  Fill-rate: ${fillrate}%<br><br>
  <b>${interpretacion(cobertura)}</b>
  `;
}
  
// ===== INTERPRETACIÓN =====
function interpretacion(c){
  if(c>=5) return "🟢 Inventario sano";
  if(c>=4) return "🟡 Riesgo moderado";
  return "🔴 Comprar urgente";
}

// INIT
renderDemanda();
renderInv();
cargarVariedades();

</script>

</body>
</html>
