<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Predictivo Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  margin:3px;
}

.btn-main {background:#22c55e;}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}
</style>
</head>

<body>

<h1>📊 S&OP Predictivo – Galera</h1>

<!-- PARÁMETROS -->
<div class="card">
<h2>⚙️ Parámetros</h2>

<label>Crecimiento (%)</label>
<input id="growth" value="10">

<label>Ticket promedio</label>
<input id="ticket" value="100">

<label>Semanas</label>
<input id="semanas" value="12">

<label>Probabilidad cierre (%)</label>
<input id="prob" value="30">

<button class="btn-main" onclick="calcular()">Calcular</button>
</div>

<!-- INPUT DEMANDA REAL -->
<div class="card">
<h2>📈 Registro de Demanda (REAL)</h2>

<input id="variedadDemanda" placeholder="Variedad">

<label>Ventas reales</label>
<input id="ventasReales" placeholder="Ej: 2000">

<label>Pipeline (ventas estimadas)</label>
<input id="pipeline" placeholder="Ej: 5000">

<label>Leads</label>
<input id="leads" placeholder="Ej: 60">

<button class="btn-main" onclick="guardarDemanda()">Guardar Demanda</button>

<table id="tablaDemanda"></table>
</div>

<!-- INVENTARIO -->
<div class="card">
<h2>📦 Inventario</h2>

<input id="variedad" placeholder="Variedad">
<input id="inv" placeholder="Inventario">
<input id="comp" placeholder="Comprometido">

<button class="btn-main" onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>📊 Resultado S&OP</h2>
<table id="tabla"></table>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>🧠 Dashboard Ejecutivo</h2>
<div id="kpis"></div>
</div>

<script>

// ===== DATA =====
let demanda = JSON.parse(localStorage.getItem("demanda")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== GUARDAR DEMANDA =====
function guardarDemanda(){

  demanda.push({
    variedad: variedadDemanda.value,
    ventas: +ventasReales.value || 0,
    pipeline: +pipeline.value || 0,
    leads: +leads.value || 0
  });

  localStorage.setItem("demanda", JSON.stringify(demanda));

  alert("Demanda guardada ✅");

  renderDemanda();
}

// ===== RENDER DEMANDA =====
function renderDemanda(){

  tablaDemanda.innerHTML = `
  <tr><th>Variedad</th><th>Ventas</th><th>Pipeline</th><th>Leads</th></tr>`;

  demanda.forEach(d=>{
    tablaDemanda.innerHTML += `
    <tr>
    <td>${d.variedad}</td>
    <td>${d.ventas}</td>
    <td>${d.pipeline}</td>
    <td>${d.leads}</td>
    </tr>`;
  });
}

// ===== INVENTARIO =====
function guardarInv(){

  let disponible = (+inv.value || 0) - (+comp.value || 0);

  inventario.push({
    variedad: variedad.value,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventario));

  alert("Inventario guardado ✅");

  renderInv();
}

function renderInv(){

  tablaInv.innerHTML = `
  <tr><th>Variedad</th><th>Disponible</th></tr>`;

  inventario.forEach(i=>{
    tablaInv.innerHTML += `
    <tr>
    <td>${i.variedad}</td>
    <td>${i.disponible}</td>
    </tr>`;
  });
}

// ===== CÁLCULO =====
function calcular(){

  if(demanda.length === 0){
    alert("Captura demanda primero ❌");
    return;
  }

  if(inventario.length === 0){
    alert("Captura inventario primero ❌");
    return;
  }

  let growth = +document.getElementById("growth").value || 0;
  let ticket = +document.getElementById("ticket").value || 0;
  let semanas = +document.getElementById("semanas").value || 12;
  let prob = +document.getElementById("prob").value || 30;

  let resultado = [];

  demanda.forEach(d=>{

    let forecast = (
      d.ventas +
      (d.pipeline * (prob/100)) +
      (d.leads * 0.1 * ticket)
    ) * (1 + growth/100);

    let invData = inventario.find(i=>i.variedad==d.variedad) || {};
    let disponible = invData.disponible || 0;

    let demandaSemanal = forecast / semanas;

    let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

    let estado = cobertura < 4 ? "🔴"
               : cobertura < 5 ? "🟡"
               : "🟢";

    let compra = Math.max(0, forecast - disponible + (forecast*0.1));

    resultado.push({variedad:d.variedad, forecast, disponible, cobertura, compra, estado});

  });

  // TABLA
  tabla.innerHTML = `
  <tr>
  <th>Variedad</th>
  <th>Forecast</th>
  <th>Disponible</th>
  <th>Cobertura</th>
  <th>Compra</th>
  <th>Estado</th>
  </tr>`;

  resultado.forEach(r=>{
    tabla.innerHTML += `
    <tr>
    <td>${r.variedad}</td>
    <td>${r.forecast.toLocaleString()}</td>
    <td>${r.disponible}</td>
    <td>${r.cobertura.toFixed(1)}</td>
    <td>${r.compra.toLocaleString()}</td>
    <td>${r.estado}</td>
    </tr>`;
  });

  // KPIs
  let coberturaProm = resultado.reduce((a,b)=>a+b.cobertura,0)/resultado.length;

  let stockout = resultado.filter(r=>r.cobertura < 4).length / resultado.length * 100;

  let fillrate = 100 - stockout;

  kpis.innerHTML = `
  Cobertura promedio: ${coberturaProm.toFixed(1)} semanas<br>
  Stockout riesgo: ${stockout.toFixed(1)}%<br>
  Fill-rate: ${fillrate.toFixed(1)}%<br><br>
  <b>${interpretacion(coberturaProm)}</b>
  `;
}

// ===== INTERPRETACIÓN =====
function interpretacion(c){
  if(c>=5) return "🟢 Inventario sano";
  if(c>=4) return "🟡 Riesgo moderado";
  return "🔴 Comprar urgente";
}

// INIT
renderInv();
renderDemanda();

</script>

</body>
</html>
