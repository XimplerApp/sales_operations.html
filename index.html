<!DOCTYPE html>
<html>
<head>
<title>📦 S&OP Automático – Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}

.green {color:#22c55e;}
.yellow {color:#facc15;}
.red {color:#ef4444;}

.kpi {font-size:18px; margin:5px 0;}
</style>
</head>

<body>

<h1>🚀 S&OP Automático – Planeación Inteligente</h1>

<!-- INVENTARIO -->
<div class="card">
<h2>Inventario</h2>

<input id="variedad" placeholder="Variedad">
<input id="inventario" placeholder="Inventario actual">
<input id="comprometido" placeholder="Comprometido">

<button onclick="guardarInventario()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>Resultado S&OP</h2>

<button onclick="calcular()">Calcular</button>

<table id="tabla"></table>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Dashboard Ejecutivo</h2>
<div id="kpis"></div>
</div>

<script>

// ===== DATA =====
let ensayos = JSON.parse(localStorage.getItem("ensayos")) || [];
let oportunidades = JSON.parse(localStorage.getItem("oportunidades")) || [];
let inventarioData = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== CONFIG =====
let PROB_CIERRE = 0.3; // 30%
let SEMANAS_TEMPORADA = 12;

// ===== GUARDAR INVENTARIO =====
function guardarInventario(){

  let disponible = inventario.value - comprometido.value;

  inventarioData.push({
    variedad: variedad.value,
    inventario: +inventario.value || 0,
    comprometido: +comprometido.value || 0,
    disponible
  });

  localStorage.setItem("inventario", JSON.stringify(inventarioData));
  renderInv();
}

// ===== RENDER INVENTARIO =====
function renderInv(){

  tablaInv.innerHTML = `
  <tr>
  <th>Variedad</th><th>Inventario</th><th>Comprometido</th><th>Disponible</th>
  </tr>`;

  inventarioData.forEach(i=>{
    tablaInv.innerHTML += `
    <tr>
    <td>${i.variedad}</td>
    <td>${i.inventario}</td>
    <td>${i.comprometido}</td>
    <td>${i.disponible}</td>
    </tr>`;
  });
}

// ===== FORECAST AUTOMÁTICO =====
function calcular(){

  let resultado = [];

  // obtener variedades únicas
  let variedades = [...new Set(ensayos.map(e=>e.variedad_tratada))];

  variedades.forEach(v=>{

    // ventas cerradas
    let ventas = oportunidades
      .filter(o => o.ventaCerrada > 0)
      .reduce((a,b)=>a + b.ventaCerrada, 0);

    // pipeline ponderado
    let pipeline = oportunidades
      .reduce((a,b)=>a + (b.ventaEstimada * PROB_CIERRE), 0);

    let forecast = ventas + pipeline;

    // inventario
    let inv = inventarioData.find(i=>i.variedad == v) || {};
    let disponible = inv.disponible || 0;

    // demanda semanal
    let demandaSemanal = forecast / SEMANAS_TEMPORADA;

    let cobertura = demandaSemanal ? disponible / demandaSemanal : 0;

    let estado = cobertura < 4 ? "🔴"
               : cobertura < 5 ? "🟡"
               : "🟢";

    let safety = forecast * 0.1;

    let compra = Math.max(0, forecast - disponible + safety);

    resultado.push({
      variedad: v,
      forecast,
      disponible,
      cobertura,
      compra,
      estado
    });

  });

  // ===== TABLA =====
  tabla.innerHTML = `
  <tr>
  <th>Variedad</th>
  <th>Forecast</th>
  <th>Disponible</th>
  <th>Cobertura</th>
  <th>Compra</th>
  <th>Estado</th>
  </tr>`;

  resultado.forEach(r=>{
    tabla.innerHTML += `
    <tr>
    <td>${r.variedad}</td>
    <td>${r.forecast.toLocaleString()}</td>
    <td>${r.disponible}</td>
    <td>${r.cobertura.toFixed(1)}</td>
    <td>${r.compra.toLocaleString()}</td>
    <td>${r.estado}</td>
    </tr>`;
  });

  // ===== KPIs =====
  let coberturaProm = resultado.reduce((a,b)=>a+b.cobertura,0)/resultado.length;

  let stockout = resultado.filter(r=>r.cobertura < 4).length / resultado.length * 100;

  let fillrate = 100 - stockout;

  kpis.innerHTML = `
  <div class="kpi">Cobertura promedio: ${coberturaProm.toFixed(1)} semanas</div>
  <div class="kpi">Stockout riesgo: ${stockout.toFixed(1)}%</div>
  <div class="kpi">Fill-rate estimado: ${fillrate.toFixed(1)}%</div>
  `;

}

// INIT
renderInv();

</script>

</body>
</html>
