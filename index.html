<!DOCTYPE html>
<html>
<head>
<title>🚀 S&OP Financiero – Galera</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}
.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
  width:100%; padding:8px; margin:5px 0;
  border-radius:6px; border:none;
}

button {
  padding:8px; border:none; border-radius:6px; cursor:pointer;
  margin:3px;
}

.btn-main {background:#22c55e;}
.btn-del {background:#ef4444; color:white;}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
  text-align:center;
}

td,th {
  border-bottom:1px solid #334155;
  padding:8px;
}

.trace {
  background:#020617;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<h1>💰 S&OP Financiero – Galera</h1>

<!-- DEMANDA -->
<div class="card">
<h2>📈 Demanda ($)</h2>

<input id="variedadDemanda" placeholder="Cultivo/Variedad">
<input id="ventasReales" placeholder="$ Ventas reales">
<input id="pipeline" placeholder="$ Pipeline">
<input id="leads" placeholder="# Leads">
<input id="fechaDemanda" type="date">

<button class="btn-main" onclick="guardarDemanda()">Guardar</button>

<table id="tablaDemanda"></table>
</div>

<!-- INVENTARIO -->
<div class="card">
<h2>📦 Inventario ($)</h2>

<select id="variedad"></select>

<input id="inv" placeholder="$ Inventario">
<input id="comp" placeholder="$ Comprometido">
<input id="fechaInv" type="date">

<button class="btn-main" onclick="guardarInv()">Guardar</button>

<table id="tablaInv"></table>
</div>

<!-- PARÁMETROS -->
<div class="card">
<h2>⚙️ Parámetros</h2>

<select id="variedadCalculo"></select>

<input id="growth" placeholder="% Crecimiento" value="10">
<input id="ticket" placeholder="$ Ticket promedio" value="10,000">
<input id="semanas" placeholder="# Semanas" value="12">
<input id="prob" placeholder="% Probabilidad cierre" value="30">

<button class="btn-main" onclick="calcular()">Calcular</button>
</div>

<!-- RESULTADO -->
<div class="card">
<h2>📊 Resultado ($)</h2>
<table id="tabla"></table>
<div id="trace" class="trace"></div>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>🧠 Dashboard</h2>
<div id="kpis"></div>
</div>

<script>

// ===== UTIL =====
function parseNumero(valor){
  return parseFloat((valor||"").replace(/,/g,"")) || 0;
}
function formato(num){
  return num.toLocaleString("en-US");
}
function hoy(){
  return new Date().toISOString().split("T")[0];
}

// ===== DATA =====
let demanda = JSON.parse(localStorage.getItem("demanda")) || [];
let inventario = JSON.parse(localStorage.getItem("inventario")) || [];

// ===== GUARDAR =====
function guardarDemanda(){
  demanda.push({
    variedad: variedadDemanda.value,
    ventas: parseNumero(ventasReales.value),
    pipeline: parseNumero(pipeline.value),
    leads: parseNumero(leads.value),
    fecha: fechaDemanda.value || hoy()
  });
  localStorage.setItem("demanda", JSON.stringify(demanda));
  renderDemanda(); cargarVariedades();
}

function guardarInv(){
  let disponible = parseNumero(inv.value) - parseNumero(comp.value);
  inventario.push({
    variedad: variedad.value,
    disponible,
    fecha: fechaInv.value || hoy()
  });
  localStorage.setItem("inventario", JSON.stringify(inventario));
  renderInv();
}

// ===== ELIMINAR =====
function eliminarDemanda(i){demanda.splice(i,1);localStorage.setItem("demanda",JSON.stringify(demanda));renderDemanda();}
function eliminarInv(i){inventario.splice(i,1);localStorage.setItem("inventario",JSON.stringify(inventario));renderInv();}

// ===== VARIEDADES =====
function cargarVariedades(){
  let vars=[...new Set(demanda.map(d=>d.variedad))];
  variedad.innerHTML=""; variedadCalculo.innerHTML="";
  vars.forEach(v=>{
    variedad.add(new Option(v,v));
    variedadCalculo.add(new Option(v,v));
  });
}

// ===== RENDER =====
function renderDemanda(){
  tablaDemanda.innerHTML="<tr><th>Variedad</th><th>$ Ventas</th><th>$ Pipeline</th><th># Leads</th><th>Fecha</th><th></th></tr>";
  demanda.forEach((d,i)=>{
    let f=d.fecha||hoy();
    tablaDemanda.innerHTML+=`
    <tr>
      <td>${d.variedad}</td>
      <td>$${formato(d.ventas)}</td>
      <td>$${formato(d.pipeline)}</td>
      <td>${formato(d.leads)}</td>
      <td><input type="date" value="${f}" onchange="editarFechaDemanda(${i},this.value)"></td>
      <td><button class="btn-del" onclick="eliminarDemanda(${i})">X</button></td>
    </tr>`;
  });
}

function renderInv(){
  tablaInv.innerHTML="<tr><th>Variedad</th><th>$ Disponible</th><th>Fecha</th><th></th></tr>";
  inventario.forEach((i,x)=>{
    let f=i.fecha||hoy();
    tablaInv.innerHTML+=`
    <tr>
      <td>${i.variedad}</td>
      <td>$${formato(i.disponible)}</td>
      <td><input type="date" value="${f}" onchange="editarFechaInv(${x},this.value)"></td>
      <td><button class="btn-del" onclick="eliminarInv(${x})">X</button></td>
    </tr>`;
  });
}

// ===== EDITAR =====
function editarFechaDemanda(i,f){demanda[i].fecha=f||hoy();localStorage.setItem("demanda",JSON.stringify(demanda));}
function editarFechaInv(i,f){inventario[i].fecha=f||hoy();localStorage.setItem("inventario",JSON.stringify(inventario));}

// ===== CALCULO =====
function calcular(){

  let tabla=document.getElementById("tabla");
  let kpis=document.getElementById("kpis");
  let trace=document.getElementById("trace");

  let v=variedadCalculo.value;

  let dReg=demanda.filter(d=>d.variedad==v)
    .sort((a,b)=>new Date(b.fecha||0)-new Date(a.fecha||0))[0];

  let iReg=inventario.filter(i=>i.variedad==v)
    .sort((a,b)=>new Date(b.fecha||0)-new Date(a.fecha||0))[0];

  if(!dReg){alert("No hay demanda");return;}

  let disponible=iReg?iReg.disponible:0;

  let growth=parseNumero(growth.value);
  let ticket=parseNumero(ticket.value);
  let semanas=parseNumero(semanas.value);
  let prob=parseNumero(prob.value);

  let pipelineValor=dReg.pipeline*(prob/100);
  let leadsValor=dReg.leads*0.1*ticket;

  let forecastBase=dReg.ventas+pipelineValor+leadsValor;
  let forecast=forecastBase*(1+growth/100);

  let demandaSemanal=forecast/semanas;
  let cobertura=disponible/demandaSemanal;

  let compra=Math.max(0,forecast-disponible+(forecast*0.1));

  let stockout=forecast>disponible?((forecast-disponible)/forecast)*100:0;
  let fillrate=forecast>0?(disponible/forecast)*100:0;

  let estado=cobertura<4?"🔴":cobertura<5?"🟡":"🟢";

  // TABLA
  tabla.innerHTML=`
  <tr><th>Variedad</th><th>$ Forecast</th><th>$ Disponible</th><th>Semanas</th><th>$ Compra</th><th>Estado</th></tr>
  <tr>
    <td>${v}</td>
    <td>$${formato(forecast)}</td>
    <td>$${formato(disponible)}</td>
    <td>${cobertura.toFixed(1)}</td>
    <td>$${formato(compra)}</td>
    <td>${estado}</td>
  </tr>`;

  // DASHBOARD
  kpis.innerHTML=`
  Cobertura: ${cobertura.toFixed(1)} semanas<br>
  Stockout: ${stockout.toFixed(1)}%<br>
  Fill-rate: ${fillrate.toFixed(1)}%<br><br>
  <b>${interpretacion(cobertura)}</b>
  `;

  // TRAZABILIDAD
  trace.innerHTML=`
  🔍 TRAZABILIDAD<br><br>

  Demanda usada: ${dReg.fecha}<br>
  Inventario usado: ${iReg?iReg.fecha:"N/A"}<br><br>

  Ventas: $${formato(dReg.ventas)}<br>
  Pipeline ajustado (${prob}%): $${formato(pipelineValor)}<br>
  Leads convertidos: $${formato(leadsValor)}<br><br>

  Forecast base: $${formato(forecastBase)}<br>
  + Crecimiento (${growth}%): $${formato(forecast)}<br><br>

  Disponible: $${formato(disponible)}<br>
  Cobertura: ${cobertura.toFixed(1)} semanas<br>
  Compra sugerida: $${formato(compra)}
  `;
}

// ===== INTERPRETACIÓN =====
function interpretacion(c){
  if(c>=5)return "🟢 Inventario sano";
  if(c>=4)return "🟡 Riesgo moderado";
  return "🔴 Comprar urgente";
}

// INIT
renderDemanda();
renderInv();
cargarVariedades();

</script>

</body>
</html>
